name: Daily Strategy Calculation

on:
  schedule:
    # Mo-Fr 21:00 UTC (nach US-Börsenschluss) — Berechnung & Signale
    - cron: '0 21 * * 1-5'
    # Mo-Fr 19:50 UTC (15:50 ET, 10 Min vor Close) — MOC Orders
    - cron: '50 19 * * 1-5'
  workflow_dispatch:  # Manueller Trigger über GitHub UI
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - compute
          - trade

permissions:
  contents: write

jobs:
  compute:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'both' || github.event.inputs.job == 'compute')
      || github.event_name == 'schedule' && github.event.schedule == '0 21 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily calculation
        env:
          SKIP_EMAIL: "1"
        run: python -m wf_backtest.daily_runner

      - name: Copy signals to GitHub Pages
        run: |
          mkdir -p docs/data
          cp wf_backtest/mobile_signals.json docs/data/mobile_signals.json

      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/mobile_signals.json
          git diff --staged --quiet && echo "No changes" || git commit -m "📊 Signals $(date -u +%Y-%m-%d)"
          git push

  trade:
    if: >-
      github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'both' || github.event.inputs.job == 'trade')
      || github.event_name == 'schedule' && github.event.schedule == '50 19 * * 1-5'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ALPACA_KEY_ID: ${{ secrets.ALPACA_KEY_ID }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_LIVE: ""
      TRADING_ENABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Auto-Trade (Alpaca Paper)
        if: env.ALPACA_KEY_ID != ''
        run: python -m trading.alpaca_trader

      - name: Commit trade log
        if: env.ALPACA_KEY_ID != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trading/trade_log.json
          git diff --staged --quiet && echo "No changes" || git commit -m "📈 Trade log $(date -u +%Y-%m-%d)"
          git push
